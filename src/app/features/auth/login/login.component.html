<div class="login-container">
  <!-- Section gauche : Vidéo avec graphique -->
  <div class="login-left">
    <video class="background-video" [src]="backgroundVideo" autoplay muted loop playsinline></video>
  </div>

  <!-- Section droite : Formulaire de connexion -->
  <div class="login-right">
    <div class="login-content">
      <h1 class="login-title">PUBGPT</h1>
      <p class="login-subtitle">votre portail pub intéligent</p>

      <!-- Toggle Standard / Demo -->
      <div class="mode-toggle">
        <button
          class="mode-btn"
          [class.active]="!isDemoMode"
          (click)="switchMode(false)"
        >Connexion</button>
        <button
          class="mode-btn"
          [class.active]="isDemoMode"
          (click)="switchMode(true)"
        >Acces Demo</button>
      </div>

      <!-- Formulaire standard -->
      <form class="login-form" (ngSubmit)="onSubmit()" *ngIf="!isDemoMode">
        <div class="form-group">
          <label for="login">Login</label>
          <input
            type="text"
            id="login"
            name="login"
            [(ngModel)]="login"
            [disabled]="isLoading"
            placeholder="Value"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            [disabled]="isLoading"
            placeholder="Value"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button
          type="submit"
          class="login-button"
          [disabled]="isLoading || !login.trim() || !password.trim()"
        >
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading">Connexion en cours...</span>
        </button>
      </form>

      <!-- Formulaire demo -->
      <form class="login-form" (ngSubmit)="onDemoSubmit()" *ngIf="isDemoMode">
        <div class="form-group">
          <label for="demoEmail">Email</label>
          <input
            type="email"
            id="demoEmail"
            name="demoEmail"
            [(ngModel)]="demoEmail"
            [disabled]="isLoading"
            placeholder="votre@email.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="demoCode">Code d'acces</label>
          <input
            type="text"
            id="demoCode"
            name="demoCode"
            class="code-input"
            [(ngModel)]="demoCode"
            [disabled]="isLoading"
            placeholder="DEMO-XXXXXX"
            maxlength="11"
            autocomplete="off"
            required
          />
        </div>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button
          type="submit"
          class="login-button"
          [disabled]="isLoading || !demoEmail.trim() || !demoCode.trim()"
        >
          <span *ngIf="!isLoading">Acceder a la demo</span>
          <span *ngIf="isLoading">Verification...</span>
        </button>
      </form>

      <a href="#" class="forgot-password" *ngIf="!isDemoMode">Forgot password?</a>
      <p class="demo-hint" *ngIf="isDemoMode">Entrez l'email et le code recu par mail apres votre demande de demo.</p>
    </div>
  </div>
</div>
