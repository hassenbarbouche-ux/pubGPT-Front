<div class="info-dialog">
  <!-- Graph animation header -->
  <div class="graph-animation">
    <svg viewBox="0 0 400 80" preserveAspectRatio="none">
      <defs>
        <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
          <stop offset="30%" stop-color="#ffffff" stop-opacity="0.9" />
          <stop offset="70%" stop-color="#e0e0e0" stop-opacity="0.9" />
          <stop offset="100%" stop-color="#e0e0e0" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
        </linearGradient>
      </defs>
      <path class="graph-area" d="M0,60 Q30,55 60,50 T120,35 T180,45 T240,25 T300,30 T360,15 L400,20 L400,80 L0,80 Z" fill="url(#areaGrad)" />
      <path class="graph-line" d="M0,60 Q30,55 60,50 T120,35 T180,45 T240,25 T300,30 T360,15 L400,20" fill="none" stroke="url(#lineGrad)" stroke-width="2" />
      <circle class="graph-dot" r="3" fill="#ffffff">
        <animateMotion dur="4s" repeatCount="indefinite" path="M0,60 Q30,55 60,50 T120,35 T180,45 T240,25 T300,30 T360,15 L400,20" />
      </circle>
      <circle class="pulse-dot" r="2" fill="#cccccc" opacity="0.5">
        <animateMotion dur="4s" repeatCount="indefinite" path="M0,60 Q30,55 60,50 T120,35 T180,45 T240,25 T300,30 T360,15 L400,20" begin="0.3s" />
      </circle>
    </svg>
  </div>

  <div class="dialog-title">pubGPT</div>

  <div class="dialog-content">
    <div class="info-section">
      <div class="info-row">
        <div class="label">Application</div>
        <div class="value">pubGPT — Analytics TV publicitaire</div>
      </div>

      <div class="info-row">
        <div class="label">Description</div>
        <div class="value">Système RAG qui convertit vos questions en langage naturel en requêtes SQL pour l'analyse des investissements publicitaires TV.</div>
      </div>

      <div class="info-row">
        <div class="label">Créé par</div>
        <div class="value creator">Hassen Barbouche</div>
      </div>

      <div class="info-row">
        <div class="label">Dernière mise à jour</div>
        <div class="value">{{ formattedDate }}</div>
      </div>

      <div class="info-row" *ngIf="commitHash !== 'local'">
        <div class="label">Version</div>
        <div class="value mono">{{ commitHash }}</div>
      </div>
    </div>
  </div>

  <div class="dialog-actions">
    <button (click)="close()">Fermer</button>
  </div>
</div>
